services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: almagest
      POSTGRES_PASSWORD: almagest
      POSTGRES_DB: almagest_reviewer
    ports:
      # 로컬에서 uvicorn 직접 실행 시에도 DB에 접근할 수 있도록 포트 노출
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U almagest -d almagest_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # DB 호스트는 Docker 네트워크 내 서비스명 'db'를 사용
      DATABASE_URL: postgresql+asyncpg://almagest:almagest@db:5432/almagest_reviewer
      # pem 파일을 고정 경로로 마운트하므로 경로 override
      GITHUB_PRIVATE_KEY_PATH: ./private-key.pem
    volumes:
      # pem 파일을 컨테이너 내 고정 경로에 마운트 (읽기 전용)
      - ${GITHUB_PRIVATE_KEY_PATH}:/app/private-key.pem:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # 소스 코드를 마운트해서 hot-reload 지원
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # Next.js 프록시 타겟을 Docker 내부 app 서비스로 지정
      API_URL: http://app:8000
    depends_on:
      - app

volumes:
  postgres_data:
