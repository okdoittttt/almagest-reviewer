services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: almagest
      POSTGRES_PASSWORD: almagest
      POSTGRES_DB: almagest_reviewer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U almagest -d almagest_reviewer"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      # Mount private key file if it exists in the root
      - ./*.pem:/app/*.pem
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:

networks:
  default:
    name: almagest-network
